<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="projeto cinco" />
    <meta name="author" content="Maisa Santos De Lana" />
    <meta name="keywords" content="patria" />
    <title>Around the us</title>
    <link rel="stylesheet" href="./pages/index.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=favorite"
    />
    <link 
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,400,1,0" 
    rel="stylesheet"
    />
       
  </head>
  <body class="body">
    <div class="page">
      <header class="header">
        <span class="header__title">Around</span>
        <span class="header__subtitle">The U.S.</span>
      </header>
      <section class="profile">
        <div class="profile__content">
          <div class="profile__images">
          <img
            class="profile__image"
            src="images/avatar.png"
            alt="Foto do perfil"
          >
           <div class="profile__image-overlay"></div>
            <img
            class="profile__image-edit"
            src="images/Vector.png"
            alt="Foto do perfil"
          ></div>
          <div class="profile__information">
            <div class="profile__bio">
              <h1 class="profile__name">Jacques Cousteau</h1>
              <span class="profile__profession">Explorador</span>
            </div>
            <button type="button" class="profile__edit-button">
            <img
              class="profile__edit-icon"
              src="images/editbutton.png"
              alt="Editar"
            >
          </button>
          </div>
        </div>
        <img
          class="profile__add-button"
          src="images/addbutton.png"
          alt="Adicionar"
        >
      </section>
      <div class="gallery">
      </div>
      <section id="popup__image-profile" class="popup">
        <div class="popup__container popup__container-img-profile">
          <h2 class="popup__title">Alterar a foto do perfil</h2>
          <form class="popup__form popup__form-img-profile">
            <div class="popup__items">
            <input
              type="url"
              id="image-link"
              placeholder="Link de imagem"
              class="popup__item"
              required
            >
            <span class="popup__image-link-error"></span>
            </div>
            <button type="submit" class="popup__button">Salvar</button>
          </form>
          <button type="button" class="popup__button-close">
            <img class="popup__close-icon"
            src="images/closeicon.png"
            alt="botão para fechar"> 
          </button>         
        </div>
        
      </section>
      <section id="popup__profile" class="popup">
        <div class="popup__container">
          <h2 class="popup__title">Editar perfil</h2>
          <form class="popup__form">
            <div class="popup__items">
            <input 
            type="text" 
            id="name" 
            placeholder="Nome" 
            class="popup__item" 
            minlength="2" 
            maxlength="40" 
            required
            >
            <span class="popup__name-error"></span>
          </div>
          <div class="popup__items">
            <input
              type="text"
              id="description"
              placeholder="Descrição"
              class="popup__item"
              minlength="2" 
              maxlength="200"
              required
            >
            <span class="popup__description-error"></span>
            </div>
            <button type="submit" class="popup__button">Salvar</button>
          </form>  
          <button type="button" class="popup__button-close">
            <img class="popup__close-icon"
            src="images/closeicon.png"
            alt="botão para fechar"> 
          </button>       
        </div>
       
      </section>
      <section id="popup__gallery-check" class="popup">
        <div class="popup__container popup__check-container">
          <h2 class="popup__title popup__check-title">Tem certeza ? </h2>
          <form class="popup__form">
            <button type="submit" class="popup__button">Sim</button>
          </form>  
          <button type="button" class="popup__button-close">
            <img class="popup__close-icon"
            src="images/closeicon.png"
            alt="botão para fechar"> 
          </button>       
        </div>
        
      </section>
      
      <section id="popup__gallery" class="popup">
        <div class="popup__container">
          <h2 class="popup__title">Nova local</h2>
          <form class="popup__form">
            <div class="popup__items">
            <input 
            type="text" 
            id="image-title" 
            placeholder="Titulo" 
            class="popup__item"
            minlength="2"
            maxlength="30"
            required>
            <span class="popup__image-title-error"></span>
            </div>
            <div class="popup__items">
            <input
              type="url"
              id="image-link"
              placeholder="Link de imagem"
              class="popup__item"
              required
            >
            <span class="popup__image-link-error"></span>
            </div>
            <button type="submit" class="popup__button">Criar</button>
          </form>
          <button type="button" class="popup__button-close">
            <img class="popup__close-icon"
            src="images/closeicon.png"
            alt="botão para fechar"> 
          </button>         
        </div>
        
      </section>

      <div id="area" class="popup">
        <div class="popup__image-content">
          <img class="popup__image-expand" src="images/lagolouise.png" alt="imagem do lago louise"/>
          <button type="button" class="popup__image-close">
            <img class="popup__close-icon"
            src="images/closeicon.png"
            alt="botão para fechar"> 
          </button>
          <span class="popup__image-footer">Lago Louise</span>
        </div>
      </div>

      <template id="gallery__template">
        <div class="gallery__item">
          <span class="delete material-symbols-rounded"> delete </span>
          <img  
            class="gallery__image"
            src="#"
            alt="#"
          >
          <div class="gallery__image-item">
            <span class="gallery__image-name">Lago de Braies</span>
            <span class="gallery__image-like">favorite</span>
          </div>
        </div>
      </template>

      <footer class="footer">&copy; 2026 Around The U.S.</footer>
    </div>

    <script type="module" src="./pages/index.js"></script>
    <script type="module" src="./components/FormValidator.js"></script>
  </body>
</html>
